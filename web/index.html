<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaPilot - A股智能投资分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .search-form {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .search-form input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }
        
        .search-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-form button {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .search-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-picks {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .quick-picks span {
            color: #666;
            font-size: 0.9rem;
        }
        
        .quick-picks a {
            color: #667eea;
            text-decoration: none;
            padding: 5px 12px;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        
        .quick-picks a:hover {
            background: #e8e8e8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .result.active {
            display: block;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .stock-info h2 {
            font-size: 1.8rem;
            color: #333;
        }
        
        .stock-info .code {
            color: #888;
            font-size: 1rem;
        }
        
        .overall-rating {
            text-align: center;
        }
        
        .rating-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
        
        .rating-circle.buy {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }
        
        .rating-circle.hold {
            background: linear-gradient(135deg, #FF9800, #F57C00);
        }
        
        .rating-circle.sell {
            background: linear-gradient(135deg, #f44336, #d32f2f);
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        
        .agent-card h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .agent-card .icon {
            font-size: 1.5rem;
        }
        
        .agent-card .content {
            color: #555;
            line-height: 1.6;
        }
        
        .agent-card .score {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .score.high {
            background: #e8f5e9;
            color: #4CAF50;
        }
        
        .score.medium {
            background: #fff3e0;
            color: #FF9800;
        }
        
        .score.low {
            background: #ffebee;
            color: #f44336;
        }
        
        .recommendation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        
        .recommendation h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .recommendation p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .error {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 12px;
            padding: 20px;
            color: #c62828;
            text-align: center;
        }
        
        footer {
            text-align: center;
            color: white;
            opacity: 0.7;
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AlphaPilot</h1>
            <p>A股智能投资分析系统 - 多维度、专业化、AI驱动</p>
        </header>
        
        <div class="search-box">
            <div class="search-form">
                <input type="text" id="stockCode" placeholder="输入股票代码，如：sh600519" />
                <button id="analyzeBtn" onclick="analyzeStock()">分析</button>
            </div>
            <div class="quick-picks">
                <span>快速选择：</span>
                <a href="#" onclick="quickPick('sh600519')">贵州茅台</a>
                <a href="#" onclick="quickPick('sh600036')">招商银行</a>
                <a href="#" onclick="quickPick('sz000858')">五粮液</a>
                <a href="#" onclick="quickPick('sh601318')">中国平安</a>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析中，请稍候...</p>
        </div>
        
        <div class="result" id="result">
            <!-- 动态内容 -->
        </div>
        
        <footer>
            <p>© 2026 AlphaPilot - Powered by CrewAI + qlib</p>
        </footer>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        function quickPick(code) {
            document.getElementById('stockCode').value = code;
            analyzeStock();
            return false;
        }
        
        async function analyzeStock() {
            const code = document.getElementById('stockCode').value.trim();
            if (!code) {
                alert('请输入股票代码');
                return;
            }
            
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            // 显示加载状态
            btn.disabled = true;
            loading.classList.add('active');
            result.classList.remove('active');
            
            try {
                const response = await fetch(`${API_BASE}/api/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ stock_code: code })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                } else {
                    showResult(code, data);
                }
            } catch (error) {
                showError('分析失败: ' + error.message);
            } finally {
                btn.disabled = false;
                loading.classList.remove('active');
            }
        }
        
        function showResult(code, data) {
            const result = document.getElementById('result');
            
            // 计算综合评级
            const rating = data.overall_rating || 'hold';
            const ratingText = {
                'buy': '买入',
                'hold': '持有',
                'sell': '卖出'
            }[rating] || '持有';
            
            // 构建HTML
            let html = `
                <div class="result-header">
                    <div class="stock-info">
                        <h2>${data.stock_name || '未知股票'}</h2>
                        <div class="code">${code}</div>
                    </div>
                    <div class="overall-rating">
                        <div class="rating-circle ${rating}">${ratingText}</div>
                        <div>综合评级</div>
                    </div>
                </div>
                
                <div class="agents-grid">
            `;
            
            // 各 Agent 结果
            const agents = [
                { key: 'quantitative', name: '量化分析师', icon: '📊' },
                { key: 'fundamental', name: '基本面分析师', icon: '📈' },
                { key: 'macro', name: '宏观分析师', icon: '🌐' },
                { key: 'alternative', name: '另类分析师', icon: '🔍' },
                { key: 'risk', name: '风控经理', icon: '⚠️' }
            ];
            
            agents.forEach(agent => {
                const agentData = data[agent.key] || {};
                const score = agentData.score || 0;
                const scoreClass = score >= 7 ? 'high' : (score >= 4 ? 'medium' : 'low');
                
                html += `
                    <div class="agent-card">
                        <h3><span class="icon">${agent.icon}</span> ${agent.name}</h3>
                        <div class="content">${agentData.summary || '分析中...'}</div>
                        <span class="score ${scoreClass}">评分: ${score}/10</span>
                    </div>
                `;
            });
            
            html += `
                </div>
                
                <div class="recommendation">
                    <h3>💡 投资建议</h3>
                    <p>${data.recommendation || '请综合参考各分析师意见做出投资决策。'}</p>
                </div>
            `;
            
            result.innerHTML = html;
            result.classList.add('active');
        }
        
        function showError(message) {
            const result = document.getElementById('result');
            result.innerHTML = `<div class="error">❌ ${message}</div>`;
            result.classList.add('active');
        }
        
        // 支持回车键触发
        document.getElementById('stockCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeStock();
            }
        });
    </script>
</body>
</html>
